<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MobileHub — Premium Mobile E-Commerce</title>
  <meta name="description" content="Shop the latest flagship smartphones from Samsung, Apple, Realme, OnePlus and Google. Free shipping on orders over $500." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>" />
</head>
<body>
  <!-- ═══ NAVIGATION ═══ -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo" id="nav-logo" data-page="home">
        <span class="logo-icon">📱</span>
        <span class="logo-text">Mobile<span class="logo-highlight">Hub</span></span>
      </a>

      <div class="nav-search" id="nav-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search phones, brands..." autocomplete="off" />
      </div>

      <div class="nav-actions">
        <div class="nav-contact" id="nav-contact">
          <a href="tel:+919030086420" class="nav-contact-item" title="Call us">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            <span>+91 9030086420</span>
          </a>
          <a href="mailto:nagarjun.sdet@gmail.com" class="nav-contact-item" title="Email us">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <span>nagarjun.sdet@gmail.com</span>
          </a>
        </div>
        <div class="nav-divider"></div>
        <button class="nav-btn" id="nav-orders-btn" data-page="orders" title="My Orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/></svg>
        </button>
        <button class="nav-btn cart-btn" id="cart-toggle-btn" title="Shopping Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" id="cart-badge">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ═══ MAIN APPLICATION ═══ -->
  <main id="app">
    <!-- Content rendered by JavaScript -->
  </main>

  <!-- ═══ CART SIDEBAR ═══ -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h2>Shopping Cart</h2>
      <button class="cart-close-btn" id="cart-close-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="cart-items" id="cart-items">
      <!-- Cart items rendered by JS -->
    </div>
    <div class="cart-footer" id="cart-footer">
      <!-- Footer rendered by JS -->
    </div>
  </aside>

  <!-- ═══ PRODUCT DETAIL MODAL ═══ -->
  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="modal" id="product-modal">
    <button class="modal-close" id="modal-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
    <div class="modal-content" id="modal-content">
      <!-- Product detail rendered by JS -->
    </div>
  </div>

  <!-- ═══ TOAST NOTIFICATIONS ═══ -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
